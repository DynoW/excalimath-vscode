name: Publish Extension

on:
  push:
    branches:
      - master
    paths:
      - package.json

concurrency:
  group: publish-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm ci --prefix webview --ignore-scripts

      - name: Detect version bump
        id: version_check
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREV_VERSION=$(git show "${{ github.event.before }}":package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" 2>/dev/null || true)

          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "previous=${PREV_VERSION}" >> "$GITHUB_OUTPUT"

          if [[ -z "${PREV_VERSION}" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "No previous package.json version found. Skipping publish."
          elif [[ "${CURRENT_VERSION}" == "${PREV_VERSION}" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged (${CURRENT_VERSION}). Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped: ${PREV_VERSION} -> ${CURRENT_VERSION}"
          fi

      - name: Build VSIX
        if: steps.version_check.outputs.should_publish == 'true'
        run: npx @vscode/vsce package

      - name: Publish to Visual Studio Marketplace
        if: steps.version_check.outputs.should_publish == 'true'
        run: npx @vscode/vsce publish -i *.vsix -p ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        if: steps.version_check.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.current }}
          name: ExcaliMath v${{ steps.version_check.outputs.current }}
          target_commitish: ${{ github.sha }}
          files: "*.vsix"
          body: |
            ## Install

            Install from Marketplace:
            https://marketplace.visualstudio.com/items?itemName=DynoW.excalimath-editor

            Or with VS Code CLI:
            `code --install-extension DynoW.excalimath-editor`

            Install from attached VSIX:
            `code --install-extension excalimath-editor-${{ steps.version_check.outputs.current }}.vsix`
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
